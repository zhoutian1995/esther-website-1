<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }

body {
  background: #2B7FD8;
}

.wallpaper {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
  background: #2B7FD8;
}

.star {
  position: absolute;
  color: #F4D758;
  font-size: var(--size, 14px);
  opacity: var(--op, 0.7);
  --push: translate(0, 0) scale(1);
  animation: twinkle var(--dur, 3s) ease-in-out infinite, wobble var(--wdur, 4s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
  transform: var(--push);
  transition: transform 0.3s ease-out;
}
.star.disturbed {
  animation-play-state: paused;
  opacity: 1 !important;
  transform: var(--push);
  transition: transform 0.1s ease-out;
}

@keyframes twinkle {
  0%, 100% { opacity: var(--op, 0.7); }
  50% { opacity: calc(var(--op, 0.7) * 0.25); }
}

@keyframes wobble {
  0%, 100% { transform: var(--push) rotate(0deg) translateX(0); }
  25% { transform: var(--push) rotate(10deg) translateX(2px); }
  75% { transform: var(--push) rotate(-10deg) translateX(-2px); }
}
</style>

<script>
(function() {
  var stars = document.querySelectorAll('.star');
  var wallpaper = document.querySelector('.wallpaper');
  
  // 缓存每颗星星的原始位置
  var starPositions = [];
  stars.forEach(function(star) {
    var rect = star.getBoundingClientRect();
    starPositions.push({
      x: rect.left + rect.width / 2,
      y: rect.top + rect.height / 2
    });
  });
  
  // resize时重算位置
  window.addEventListener('resize', function() {
    stars.forEach(function(star, i) {
      var rect = star.getBoundingClientRect();
      starPositions[i] = {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
      };
    });
  });

  var mx = -9999, my = -9999;
  var radius = 130;
  var raf;

  wallpaper.addEventListener('mousemove', function(e) {
    mx = e.clientX;
    my = e.clientY;
  });

  function update() {
    stars.forEach(function(star, i) {
      // 用当前实时位置
      var rect = star.getBoundingClientRect();
      var sx = rect.left + rect.width / 2;
      var sy = rect.top + rect.height / 2;
      var dx = sx - mx;
      var dy = sy - my;
      var dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < radius) {
        var force = (1 - dist / radius) * 20;
        var angle = Math.atan2(dy, dx);
        var pushX = Math.cos(angle) * force;
        var pushY = Math.sin(angle) * force;
        var scale = 1 + (1 - dist / radius) * 0.4;
        star.style.setProperty('--push', 'translate(' + pushX + 'px, ' + pushY + 'px) scale(' + scale + ')');
        star.classList.add('disturbed');
      } else {
        star.style.setProperty('--push', 'translate(0, 0) scale(1)');
        star.classList.remove('disturbed');
      }
    });
    raf = requestAnimationFrame(update);
  }
  raf = requestAnimationFrame(update);
})();
</script>
